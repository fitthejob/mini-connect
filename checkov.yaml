skip-check:
  - CKV_AWS_117  # Lambda VPC: Connect-invoked Lambdas do not require VPC placement.
                 # Amazon Connect is a managed service with its own network boundary.
                 # Adding VPC would require NAT Gateway with no security benefit for this pattern.

  - CKV_AWS_18   # S3 access logging on LambdaArtifactsAccessLogs bucket: this bucket IS the
                 # access log destination for the artifact bucket. Logging a log bucket to itself
                 # creates a circular dependency. AWS documentation explicitly exempts access log
                 # buckets from this requirement. A centralized log aggregation account is the
                 # correct long-term solution (see docs/TODO.md cross-cutting items).

  - CKV_AWS_115  # Lambda reserved concurrency: this is a reference implementation with largely
                 # idle traffic. Reserved concurrency is a production scaling and cost control
                 # concern, not a security requirement. Setting it on a demo system causes
                 # account-level concurrency conflicts. Should be configured per environment
                 # when promoting to production.

  - CKV_AWS_111  # LogRetention custom resource IAM policy: CDK auto-generates this Lambda and
                 # its IAM policy when logRetention is set on a Lambda function. The policy
                 # grants logs:PutRetentionPolicy and logs:DeleteRetentionPolicy on Resource: *.
                 # This is a CDK internal implementation detail — the resource and policy are
                 # not authored by this repo and cannot be scoped further without forking CDK.

  - CKV_AWS_116  # LogRetention custom resource DLQ: same CDK-generated Lambda as above.
                 # CDK does not expose a DLQ configuration on the LogRetention custom resource.
                 # This is an internal CDK construct limitation, not a gap in application code.
